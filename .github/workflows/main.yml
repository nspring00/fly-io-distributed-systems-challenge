name: Test all DS challenges

on: [push,pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install APT dependencies
        run: sudo apt install -y graphviz gnuplot xvfb
      - name: Setup .NET SDK 7.0.x
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'
      - uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Download Maelstrom 2.2.0
        run: |
          curl -sLO https://github.com/jepsen-io/maelstrom/releases/download/v0.2.2/maelstrom.tar.bz2 -o maelstrom.tar.bz2
          tar -xf maelstrom.tar.bz2
      - name: Install C# dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test file name
        run: ls Challenge.Echo/bin/Release/net7.0
      - name: Run the test
        run: |
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          java -jar maelstrom/lib/maelstrom.jar test -w echo --bin Challenge.Echo/bin/Release/net7.0/Challenge.Echo --node-count 1 --time-limit 10

      
      
